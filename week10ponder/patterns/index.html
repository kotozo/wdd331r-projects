<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>creating and using patterns</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Creating and Using Patterns</h1>    

    <svg width="200" height="200">
        <!-- define a pattern -->
        <defs>
            <pattern id="myPattern" patternUnits="userSpaceOnUse" x="0" y="0" width="50" height="50">
                <rect x="0" y="0" width="50" rx="10" ry="10" height="50" class="rectangle" />
                <circle cx="25" cy="25" r="8" fill="white" stroke="darkred" stroke-width="2" />
            </pattern>
        </defs>

        <!-- use the pattern in a circle-->
        <circle cx="100" cy="100" r="100" fill="url(#myPattern)" stroke="black" stroke-width="2" />
    </svg>

</body>
</html>
