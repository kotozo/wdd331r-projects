<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Card Back</title>
    <link rel="stylesheet" href="css/card-back.css">
</head>
<body>
    <div class="card-back">
  <svg
    class="card-back__svg"
    viewBox="0 0 360 520"
    xmlns="http://www.w3.org/2000/svg"
    aria-hidden="true"
  >

    <!-- ========== DEFINITIONS ========== -->
    <defs>

      <!-- Pattern definition -->
      <pattern
        id="pattern-diagonal"
        patternUnits="userSpaceOnUse"
        width="40"
        height="40"
      >
        <path
          d="M0 40 L40 0"
          class="pattern-line"
        />
      </pattern>

      <!-- Decorative corner symbol -->
      <symbol
        id="corner-ornament"
        viewBox="0 0 40 40"
      >
        <path
          d="M0 0 L40 0 L40 10 C10 10 10 40 40 40 L0 40 Z"
          class="ornament-shape"
        />
      </symbol>

      <!-- Center emblem symbol -->
      <symbol
        id="center-emblem"
        viewBox="0 0 100 100"
      >
        <g class="emblem">
          <circle cx="50" cy="50" r="45" />
          <path d="M50 20 L65 65 L35 65 Z" />
        </g>
      </symbol>

    </defs>

    <!-- ========== CARD BASE ========== -->
    <rect
      class="card-base"
      x="0"
      y="0"
      width="360"
      height="520"
      rx="16"
    />

    <!-- ========== PATTERN LAYER ========== -->
    <rect
      class="card-pattern"
      x="20"
      y="20"
      width="320"
      height="480"
      rx="12"
      fill="url(#pattern-diagonal)"
    />

    <!-- ========== FRAME GROUP ========== -->
    <g class="card-frame">
      <use href="#corner-ornament" x="10" y="10" />
      <use href="#corner-ornament" x="310" y="10" transform="scale(-1,1)" />
      <use href="#corner-ornament" x="10" y="470" transform="scale(1,-1)" />
      <use href="#corner-ornament" x="310" y="470" transform="scale(-1,-1)" />
    </g>

    <!-- ========== CENTER EMBLEM ========== -->
    <g
      class="card-emblem"
      transform="translate(130 210) scale(1)"
    >
      <use href="#center-emblem" />
    </g>

  </svg>
</div>
</body>
</html>
