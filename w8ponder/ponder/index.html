<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creating a CSS Curtain Opening Effect</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!--The parent component-->
    <div class="curtain">
        <!--The wrapper for the curtain panels -->
        <div class="curtain__wrapper">

            <!-- The checkbox for controlling the curtain -->

            <input type="checkbox" checked>

            <!-- The left curtain panel-->

            <div class="curtain__panel curtain__panel--left">

            <!-- The content for the prizecurtain panel -->
                
            </div>
             <div class="curtain__content">
                <img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/9632/trophy.svg">
                <h2>Achievement Unlocked!</h2>
            </div>
             <div class="curtain__panel curtain__panel--right">
                
            </div>
        </div>
    </div>
</body>
</html>
